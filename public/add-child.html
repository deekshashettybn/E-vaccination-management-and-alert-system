<!DOCTYPE html>
<html>
<head>
  <title>Add Child | E-Vaccination</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="form-page">
    <div class="form-box">
      <h2>Add Child Details</h2>

      <form id="childForm">
        <input type="text" id="childName" placeholder="Child Name" required>
        <input type="date" id="dob" required>

        <select id="gender" required>
          <option value="">Select Gender</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
          <option value="Other">Other</option>
        </select>

        <input type="number" id="weight" placeholder="Weight in kg" step="0.1" required>

        <button type="submit">Add Child</button>
      </form>

      <p id="message"></p>
      <p><a href="dashboard.html">Back to Dashboard</a></p>
    </div>
  </div>

  <script src="add-child.js"></script>
</body>
</html>
